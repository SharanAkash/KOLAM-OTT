upstream api_qa {
    server api-qa:3001;
}

upstream web_qa {
    server web-qa:3000;
}

# Rate limiting
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=web_limit:10m rate=30r/s;

server {
    listen 80;
    server_name qa.YOUR_DOMAIN.com api-qa.YOUR_DOMAIN.com;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

# API Server - QA
server {
    listen 443 ssl http2;
    server_name api-qa.YOUR_DOMAIN.com;

    # SSL Configuration (update with your certificates)
    ssl_certificate /etc/nginx/ssl/qa.crt;
    ssl_certificate_key /etc/nginx/ssl/qa.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Environment "QA" always;

    # QA Environment Banner
    add_header X-QA-Environment "true" always;

    client_max_body_size 500M;

    location / {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://api_qa;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://api_qa/health;
        access_log off;
    }
}

# Web Application - QA
server {
    listen 443 ssl http2;
    server_name qa.YOUR_DOMAIN.com;

    # SSL Configuration
    ssl_certificate /etc/nginx/ssl/qa.crt;
    ssl_certificate_key /etc/nginx/ssl/qa.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Environment "QA" always;

    client_max_body_size 100M;

    location / {
        limit_req zone=web_limit burst=50 nodelay;

        proxy_pass http://web_qa;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Static files caching
    location /_next/static {
        proxy_pass http://web_qa;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, max-age=3600, immutable";
    }
}
