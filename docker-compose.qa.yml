version: '3.8'

services:
  # QA PostgreSQL Database
  postgres-qa:
    image: postgres:15-alpine
    container_name: kolam-ott-postgres-qa
    environment:
      POSTGRES_USER: kolam_qa
      POSTGRES_PASSWORD: ${QA_DB_PASSWORD:-qa_password_change_me}
      POSTGRES_DB: kolam_ott_qa
    ports:
      - "5433:5432"
    volumes:
      - postgres-qa-data:/var/lib/postgresql/data
      - ./services/api/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - kolam-qa-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kolam_qa"]
      interval: 10s
      timeout: 5s
      retries: 5

  # QA API Service
  api-qa:
    build:
      context: ./services/api
      dockerfile: Dockerfile
      target: production
    container_name: kolam-ott-api-qa
    env_file:
      - ./services/api/.env.qa
    environment:
      DATABASE_URL: postgresql://kolam_qa:${QA_DB_PASSWORD:-qa_password_change_me}@postgres-qa:5432/kolam_ott_qa?schema=public
    ports:
      - "3001:3001"
    depends_on:
      postgres-qa:
        condition: service_healthy
    networks:
      - kolam-qa-network
    volumes:
      - ./services/api/uploads:/app/uploads
    command: sh -c "npx prisma migrate deploy && npm run start:prod"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # QA Web Application
  web-qa:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: production
    container_name: kolam-ott-web-qa
    env_file:
      - ./apps/web/.env.qa
    ports:
      - "3000:3000"
    depends_on:
      - api-qa
    networks:
      - kolam-qa-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis for Caching (Optional but recommended for QA)
  redis-qa:
    image: redis:7-alpine
    container_name: kolam-ott-redis-qa
    ports:
      - "6380:6379"
    volumes:
      - redis-qa-data:/data
    networks:
      - kolam-qa-network
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx Reverse Proxy for QA
  nginx-qa:
    image: nginx:alpine
    container_name: kolam-ott-nginx-qa
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/qa.conf:/etc/nginx/conf.d/default.conf
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - api-qa
      - web-qa
    networks:
      - kolam-qa-network
    restart: unless-stopped

volumes:
  postgres-qa-data:
    driver: local
  redis-qa-data:
    driver: local

networks:
  kolam-qa-network:
    driver: bridge
