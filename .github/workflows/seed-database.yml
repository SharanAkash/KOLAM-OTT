name: Seed Database

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to seed'
        required: true
        default: 'qa'
        type: choice
        options:
          - qa
          - prod

env:
  AWS_REGION: us-east-1
  ECS_CLUSTER: kolam-ott-${{ github.event.inputs.environment }}

jobs:
  seed:
    name: Seed Database
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run seed script
        run: |
          TASK_DEF=$(aws ecs describe-services --cluster ${{ env.ECS_CLUSTER }} --services api --region ${{ env.AWS_REGION }} --query 'services[0].taskDefinition' --output text)
          SUBNET=$(aws ecs describe-services --cluster ${{ env.ECS_CLUSTER }} --services api --region ${{ env.AWS_REGION }} --query 'services[0].networkConfiguration.awsvpcConfiguration.subnets[0]' --output text)
          SG=$(aws ecs describe-services --cluster ${{ env.ECS_CLUSTER }} --services api --region ${{ env.AWS_REGION }} --query 'services[0].networkConfiguration.awsvpcConfiguration.securityGroups[0]' --output text)

          echo "🌱 Running database seed on ${{ github.event.inputs.environment }}..."

          TASK_ARN=$(aws ecs run-task \
            --cluster ${{ env.ECS_CLUSTER }} \
            --task-definition $TASK_DEF \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNET],securityGroups=[$SG],assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"api","command":["node","seed-prod.js"]}]}' \
            --region ${{ env.AWS_REGION }} \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "Task: $TASK_ARN"
          echo "⏳ Waiting for completion..."

          aws ecs wait tasks-stopped --cluster ${{ env.ECS_CLUSTER }} --tasks $TASK_ARN --region ${{ env.AWS_REGION }}

          EXIT_CODE=$(aws ecs describe-tasks --cluster ${{ env.ECS_CLUSTER }} --tasks $TASK_ARN --region ${{ env.AWS_REGION }} --query 'tasks[0].containers[0].exitCode' --output text)

          if [ "$EXIT_CODE" == "0" ]; then
            echo "✅ Database seeded successfully!"
            echo ""
            echo "📋 Test Credentials:"
            echo "   Admin:   admin@kolamott.com / Admin@123"
            echo "   Premium: test@kolamott.com / Test@123"
            echo "   Free:    free@kolamott.com / Free@123"
          else
            echo "❌ Seed failed with exit code: $EXIT_CODE"
            exit 1
          fi
