name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [dev]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          cd apps/web
          npm ci

      - name: Lint web app
        run: |
          cd apps/web
          npm run lint || true

      - name: Build web app
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001
          NEXT_PUBLIC_WEB_URL: http://localhost:3000
        run: |
          cd apps/web
          npm run build

  api-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: services/api/package-lock.json

      - name: Install dependencies
        run: |
          cd services/api
          npm ci

      - name: Generate Prisma Client
        run: |
          cd services/api
          npx prisma generate

      - name: Build API
        run: |
          cd services/api
          npm run build

      - name: Lint API
        run: |
          cd services/api
          npm run lint || true
