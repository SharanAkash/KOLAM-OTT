name: Deploy to QA

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECS_CLUSTER: kolam-ott-qa
  ECR_REGISTRY: 637423656090.dkr.ecr.us-east-1.amazonaws.com
  ALB_URL: http://kolam-ott-qa-alb-146970630.us-east-1.elb.amazonaws.com

jobs:
  deploy-web:
    name: Deploy Web App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push web image
        working-directory: ./apps/web
        run: |
          docker build \
            --platform linux/amd64 \
            --build-arg NEXT_PUBLIC_API_URL=${{ env.ALB_URL }} \
            --build-arg NEXT_PUBLIC_WEB_URL=${{ env.ALB_URL }} \
            -t ${{ env.ECR_REGISTRY }}/kolam-ott/qa/web:${{ github.sha }} \
            -t ${{ env.ECR_REGISTRY }}/kolam-ott/qa/web:latest \
            .

          docker push ${{ env.ECR_REGISTRY }}/kolam-ott/qa/web:${{ github.sha }}
          docker push ${{ env.ECR_REGISTRY }}/kolam-ott/qa/web:latest

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service web \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for deployment
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services web \
            --region ${{ env.AWS_REGION }}

      - name: Deployment successful
        run: |
          echo "✅ Web app deployed successfully!"
          echo "🌐 URL: ${{ env.ALB_URL }}/login"

  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        working-directory: ./services/api
        run: |
          docker build \
            --platform linux/amd64 \
            -t ${{ env.ECR_REGISTRY }}/kolam-ott/qa/api:${{ github.sha }} \
            -t ${{ env.ECR_REGISTRY }}/kolam-ott/qa/api:latest \
            .

          docker push ${{ env.ECR_REGISTRY }}/kolam-ott/qa/api:${{ github.sha }}
          docker push ${{ env.ECR_REGISTRY }}/kolam-ott/qa/api:latest

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service api \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for deployment
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services api \
            --region ${{ env.AWS_REGION }}

      - name: Run database migrations
        run: |
          TASK_DEF=$(aws ecs describe-services --cluster ${{ env.ECS_CLUSTER }} --services api --region ${{ env.AWS_REGION }} --query 'services[0].taskDefinition' --output text)
          SUBNET=$(aws ecs describe-services --cluster ${{ env.ECS_CLUSTER }} --services api --region ${{ env.AWS_REGION }} --query 'services[0].networkConfiguration.awsvpcConfiguration.subnets[0]' --output text)
          SG=$(aws ecs describe-services --cluster ${{ env.ECS_CLUSTER }} --services api --region ${{ env.AWS_REGION }} --query 'services[0].networkConfiguration.awsvpcConfiguration.securityGroups[0]' --output text)

          TASK_ARN=$(aws ecs run-task \
            --cluster ${{ env.ECS_CLUSTER }} \
            --task-definition $TASK_DEF \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNET],securityGroups=[$SG],assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"api","command":["sh","-c","npx prisma migrate deploy && node seed-prod.js || true"]}]}' \
            --region ${{ env.AWS_REGION }} \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "Migration task: $TASK_ARN"
          aws ecs wait tasks-stopped --cluster ${{ env.ECS_CLUSTER }} --tasks $TASK_ARN --region ${{ env.AWS_REGION }}

          EXIT_CODE=$(aws ecs describe-tasks --cluster ${{ env.ECS_CLUSTER }} --tasks $TASK_ARN --region ${{ env.AWS_REGION }} --query 'tasks[0].containers[0].exitCode' --output text)
          if [ "$EXIT_CODE" != "0" ]; then
            echo "⚠️  Migration task exited with code $EXIT_CODE"
          else
            echo "✅ Database migrations completed"
          fi

      - name: Deployment successful
        run: |
          echo "✅ API deployed successfully!"
          echo "🔗 API URL: ${{ env.ALB_URL }}/auth/login"
